name: Refresh gacha data

# Re-scrapes game-i.daa.jp, refreshes character icon maps, and commits any
# changes back to main. GitHub Pages (deploy-from-branch) then redeploys.
on:
  schedule:
    - cron: "0 21 * * *"     # daily, 21:00 UTC
  push:
    branches: [main]          # refresh data right after every code push
                              # (no loop: the bot's own GITHUB_TOKEN commit
                              #  never triggers workflows)
  workflow_dispatch:          # allow manual runs from the Actions tab

concurrency:
  group: refresh-data
  cancel-in-progress: false

permissions:
  contents: write             # needed to push the updated JSON

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (for face-crop icons)
        run: pip install -r requirements.txt

      - name: Refresh character icon maps (Enka + StarRailRes)
        run: python scripts/build_icons.py
        continue-on-error: true    # never block a data refresh if a source is down

      - name: Scrape banner revenue (game-i)
        run: python scripts/scrape.py

      - name: Attach character portraits
        run: python scripts/enrich_icons.py

      - name: Translate names (refresh maps so new characters get picked up)
        run: python scripts/translate_names.py --refresh
        continue-on-error: true

      - name: Crop face icons from banner art (icon-less games)
        run: python scripts/face_icons.py
        continue-on-error: true    # face detection is best-effort

      - name: Sample bar colors from banner art
        run: python scripts/bar_colors.py
        continue-on-error: true

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data icons
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh gacha data ($(date -u +%Y-%m-%d))"
            git push
          fi
