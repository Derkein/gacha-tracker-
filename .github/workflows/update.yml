name: Refresh gacha data

# Re-scrapes game-i.daa.jp, refreshes character icon maps, and commits any
# changes back to main. GitHub Pages (deploy-from-branch) then redeploys.
on:
  schedule:
    # game-i rolls its daily tally at 00:00 JST (15:00 UTC). GitHub's scheduled
    # runs are often delayed 10-40 min and are sometimes dropped entirely under
    # load, so we fire a few times across the first hour after midnight JST. The
    # "no changes" guard + the refresh-data concurrency group make the extra runs
    # cheap no-ops once the day's data is already committed.
    - cron: "10 15 * * *"    # 00:10 JST — target (10 min after the rollover)
    - cron: "40 15 * * *"    # 00:40 JST — fallback if the first is delayed/dropped
    - cron: "20 16 * * *"    # 01:20 JST — last-chance fallback
  push:
    branches: [main]          # refresh data right after every code push
                              # (no loop: the bot's own GITHUB_TOKEN commit
                              #  never triggers workflows)
  workflow_dispatch:          # allow manual runs from the Actions tab

concurrency:
  group: refresh-data
  cancel-in-progress: false

permissions:
  contents: write             # needed to push the updated JSON

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5   # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065   # v5
        with:
          python-version: "3.12"

      - name: Install dependencies (for face-crop icons)
        run: pip install -r requirements.txt

      - name: Refresh character icon maps (Enka + StarRailRes)
        run: python scripts/build_icons.py
        continue-on-error: true    # never block a data refresh if a source is down

      - name: Scrape banner revenue (game-i)
        run: python scripts/scrape.py

      - name: Attach character portraits
        run: python scripts/enrich_icons.py

      - name: Translate names (refresh maps so new characters get picked up)
        run: python scripts/translate_names.py --refresh
        continue-on-error: true

      - name: Crop face icons from banner art (icon-less games)
        run: python scripts/face_icons.py
        continue-on-error: true    # face detection is best-effort

      - name: Sample bar colors from banner art
        run: python scripts/bar_colors.py
        continue-on-error: true

      - name: Commit changes
        run: |
          git config user.name  "Derkein"
          git config user.email "55472705+Derkein@users.noreply.github.com"
          git add data icons
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh gacha data ($(date -u +%Y-%m-%d))"
            git push
          fi
